version: '3.8'

services:
  backend:
    build: ./server
    restart: always
    ports:
      - "5000:5000"
    # 🔥 This loads all your keys (Gemini, Stripe, Polygon, etc.) from your .env file
    env_file:
      - ./server/.env
    # We no longer depend on a local 'mongo' service because you use Atlas
    # depends_on is removed unless you have other local services

  frontend:
    build: ./client
    restart: always
    ports:
      - "80:80"
    # Ensure the frontend knows where the backend is
    depends_on:
      - backend

# We removed the 'volumes' section because Atlas manages its own storage