server {
    listen 80;
    server_name localhost;

    # 1. API PROXY (Highest Priority)
    # We use ^~ to tell Nginx: "If it starts with /api/, stop looking elsewhere and use this"
    location ^~ /api/ {
        # This removes /api/ from the URL before sending to the backend
        rewrite ^/api/(.*)$ /$1 break;
        
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Extended timeouts for Blockchain and PDF generation
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # 2. SOCKETS
    location /socket.io/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # 3. STATIC FRONTEND (Fallback)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}